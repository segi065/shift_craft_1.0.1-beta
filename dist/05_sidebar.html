<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

    <body>

        <div id="name" class="text-bold m-2">
            <select class="form-select-sm fs-6" id="namelist" onchange="load()">
                <option value="" disabled selected>名前を選択してください</option>
            </select>
        </div>
        <div id="dates"></div>

        <div id="range"></div>

        <template id="date-template">
            <div class="date_block m-2">
                <div class="date"></div>
                <div class="times"></div>

                <button class="btn btn-sm btn-primary mt-1 add_time">＋追加</button>
            </div>

        </template>

        <template id="time-template">
            <div class="d-flex align-items-center gap-1 mt-1 mb-1 time_block">
                <input class="form-control w-auto start" type="time" step="3600">
                <span>-</span>
                <input class="form-control w-auto end" type="time">
                <button class="btn btn-sm btn-danger remove_time">削除</button>
            </div>
        </template>

        <template id="range-template">
            <div class="d-flex align-items-center gap-2 m-2">
                <div>
                    <label>最低勤務時間</label>
                    <input class="form-control min" type="text" style="width: 8em;">
               
                </div>
                <div>
                    <label>最大勤務時間</label>
                    <input class="form-control max" type="text" style="width: 8em;">

                </div>
            </div>
            
            <button class="btn btn-primary ms-2 mb-2" onclick="save()">保存</button>
        </template>

        <script>
            let lastupdate = 0;
            google.script.run.withSuccessHandler(data => {
                const namelist = document.getElementById("namelist");
                data.forEach(name => {
                    const option = document.createElement("option");
                    option.value = name;
                    option.innerText = name;
                    namelist.appendChild(option);
                });
            }).get_namelist();

            function load() {
                const name = document.getElementById("namelist").value;
                document.getElementById("dates").innerHTML = "";
                document.getElementById("range").innerHTML = "";
                google.script.run.withSuccessHandler(function([data, range_data]) {
                    console.log(data);
                    console.log(range_data);

                    google.script.run.withSuccessHandler(dates => {

                        dates.forEach(date => {
                            const date_template = document.getElementById("date-template");
                            const date_clone = date_template.content.cloneNode(true);

                            date_clone.querySelector(".date").innerText = date;
                            const times = date_clone.querySelector(".times");

                            data.forEach(request => {
                                if(request[1].trim() !== date.trim()) return;

                                const time_template = document.getElementById("time-template");
                                const time_clone = time_template.content.cloneNode(true);

                                time_clone.querySelector(".time_block .start").value = request[2];
                                time_clone.querySelector(".time_block .end").value = request[3];
                                times.appendChild(time_clone);
                            });
                            
                            document.getElementById("dates").appendChild(date_clone);
                        });

                        const range_template = document.getElementById("range-template");
                        const range_clone = range_template.content.cloneNode(true);
                        if(range_data.length > 0) {
                            range_clone.querySelector(".min").value = range_data[0][1];
                            range_clone.querySelector(".max").value = range_data[0][2];
                        };
                        document.getElementById("range").appendChild(range_clone);
                    })
                    .getdates();

                }).get_request_data(name);
            };

            document.addEventListener("click", function(e){
                if(e.target.classList.contains("add_time")) {
                    const template = document.getElementById("time-template");
                    const clone = template.content.cloneNode(true);

                    const el = e.target.closest(".date_block").querySelector(".times");
                    el.appendChild(clone);
                }
            });

            document.addEventListener("click", function(e){
                if(e.target.classList.contains("remove_time")) {
                    const el = e.target.closest(".time_block");
                    el.remove();
                }
            });

            function save() {
                const name = document.getElementById("namelist").value;
                const dates = document.querySelectorAll(".date_block");

                const data = [];
                dates.forEach(date => {
                    const date_text = date.querySelector(".date").innerText;
                    const times = date.querySelectorAll(".times .d-flex");
                    times.forEach(time => {
                        const start = time.querySelector(".start").value;
                        const end = time.querySelector(".end").value;
                        if(start && end) {
                            data.push([name, date_text, start, end]);
                        }
                    });
                });

                const min = document.querySelector(".min").value;
                const max = document.querySelector(".max").value;
                const range_data = [name, min, max];

                google.script.run.save_request_data(name, data, range_data);
            };
        </script>
    </body>
</html>
